- galPosts:
    Control: Gallery@2.15.0
    Variant: Vertical
    Properties:
      Height: =Parent.Height
      Items: =colReconocimientos
      TemplatePadding: =12
      TemplateSize: =If(Screen5.Size=1, 360, 320)
      Width: =Parent.Width
    Children:
      - galPosts_Card:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
