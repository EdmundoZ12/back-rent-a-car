                  - galPosts_Card_Acciones_Dislike:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Height: =26
                        Image: ="data:image/svg+xml;utf8, "&EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='40px' height='40px' viewBox='0 0 20 20' fill='#000000'><path d='M10.05 17.7c.34.98 1.63 1.43 2.43.6.17-.17.33-.36.44-.52.32-.48.45-1.12.5-1.73.05-.63.02-1.3-.05-1.92-.06-.6-.16-1.17-.24-1.58v-.05H14a3 3 0 0 0 2.95-3.54l-.69-3.76a4.5 4.5 0 0 0-5.6-3.54L5.06 3.2c-.92.25-1.62 1-1.8 1.92l-.35 1.77c-.28 1.39.78 2.56 1.9 3 .33.13.62.3.85.5 1.7 1.5 2.32 2.72 3.38 4.84.36.71.72 1.68 1 2.49Zm1.97-5.58v.04a14.2 14.2 0 0 1 .36 2.08c.06.58.09 1.18.04 1.73-.04.55-.15.98-.33 1.25-.06.1-.18.22-.33.39-.2.2-.63.16-.76-.23-.29-.82-.67-1.83-1.05-2.6-1.07-2.14-1.76-3.5-3.62-5.15-.34-.3-.74-.52-1.13-.68-.88-.34-1.45-1.14-1.3-1.87l.35-1.77c.11-.56.53-1 1.08-1.15l5.6-1.53a3.5 3.5 0 0 1 4.36 2.75l.68 3.76a2 2 0 0 1-1.96 2.36h-1.5a.5.5 0 0 0-.5.62Z'/></svg>")
                        Width: =26
                  - galPosts_Card_Acciones_DislikeNum:
                      Control: ModernText@1.0.0
                      Properties:
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =13
                        Text: ="1"
                  - galPosts_Card_Acciones_Comments:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(0,0,0,0)
                        FillPortions: =1
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =6
                        LayoutJustifyContent: =LayoutJustifyContent.End
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                      Children:
                        - galPosts_Card_Acciones_Comments_Icon:
                            Control: Image@2.2.3
                            Properties:
                              Height: =26
                              Image: |
                                ="data:image/svg+xml," & EncodeUrl("
                                <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='40px' height='40px'>
                                  <style>
                                    .chat-bubble" & gblChatTimestamp & " {
                                      fill: none;
                                      stroke: #2E7D4F;
                                      stroke-width: 2;
                                      stroke-linecap: round;
                                      stroke-linejoin: round;
                                    }
                                    .chat-dot" & gblChatTimestamp & " {
                                      fill: #2E7D4F;
                                      animation-name: chatDotBounce;
                                      animation-duration: " & If(IsBlank(gblChatState), "0ms", "600ms") & ";
                                      animation-timing-function: ease-in-out;
                                      animation-iteration-count: infinite;
                                    }
                                    .chat-dot1" & gblChatTimestamp & " { animation-delay: 0ms; }
                                    .chat-dot2" & gblChatTimestamp & " { animation-delay: 150ms; }
                                    .chat-dot3" & gblChatTimestamp & " { animation-delay: 300ms; }
                                    @keyframes chatDotBounce {
                                      0%, 100% { transform: translateY(0); }
                                      50% { transform: translateY(-3px); }
                                    }
                                  </style>
                                  <path class='chat-bubble" & gblChatTimestamp & "' d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' />
                                  <circle class='chat-dot" & gblChatTimestamp & " chat-dot1" & gblChatTimestamp & "' cx='8' cy='10' r='1.2' />
                                  <circle class='chat-dot" & gblChatTimestamp & " chat-dot2" & gblChatTimestamp & "' cx='12' cy='10' r='1.2' />
                                  <circle class='chat-dot" & gblChatTimestamp & " chat-dot3" & gblChatTimestamp & "' cx='16' cy='10' r='1.2' />
                                </svg>
                                ")
                              OnSelect: |-
                                =If(
                                    CountRows(Filter(colExpandidos, PostID = ThisItem.Id)) > 0,
                                    RemoveIf(colExpandidos, PostID = ThisItem.Id),
                                    Collect(colExpandidos, {PostID: ThisItem.Id})
                                );
                                Set(gblChatTimestamp, Text(Now(), "yyyymmddhhmmss"))
                              Width: =26
                        - galPosts_Card_Acciones_Comments_Lbl:
                            Control: ModernText@1.0.0
                            Properties:
                              Color: =ColorValue("#2E7D4F")
                              FontWeight: =FontWeight.Bold
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              Size: =13
                              Text: =ThisItem.Comentarios & " comentarios"
            - galPosts_Card_Comments:
