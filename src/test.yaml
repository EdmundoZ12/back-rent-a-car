                      Control: ModernText@1.0.0
                      Properties:
                        Color: =RGBA(122, 138, 143, 1)
                        FillPortions: =1
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =11
                        Text: ="Reconocido por " & ThisItem.ReconocidoPor
            - galPosts_Card_Mensaje:
                Control: ModernText@1.0.0
                Properties:
                  Align: =If(Screen5.Size=1, Align.Left, Align.Justify)
                  AutoHeight: =true
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingTop: =4
                  Size: =If(Screen5.Size=1, 13, 14)
