                        AutoDisableOnSelect: =false
                        BorderThickness: =0
                        Color: =RGBA(90,90,90,1)
                        DisplayMode: =DisplayMode.View
                        Fill: =RGBA(229,231,235,1)
                        Height: =30
                        HoverBorderColor: =
                        HoverColor: =
                        HoverFill: =
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PressedBorderColor: =
                        PressedColor: =
                        PressedFill: =
