            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            LayoutMinHeight: =16
            PaddingBottom: =12
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =12
            RadiusBottomLeft: =16
            RadiusBottomRight: =16
            RadiusTopLeft: =16
            RadiusTopRight: =16
            Width: =Parent.Width-(galPosts.TemplatePadding*2)
