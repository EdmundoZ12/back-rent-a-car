                                    DisplayMode: =DisplayMode.View
                                    Fill: =ThisItem.AvatarColor
                                    Height: =32
                                    HoverBorderColor: =
                                    HoverColor: =
                                    HoverFill: =
                                    PressedBorderColor: =
                                    PressedColor: =
                                    PressedFill: =
                                    RadiusBottomLeft: =16
                                    RadiusBottomRight: =16
                                    RadiusTopLeft: =16
                                    RadiusTopRight: =16
                                    Size: =10
                                    Text: =ThisItem.Iniciales
                                    Width: =32
                              - galPosts_Card_Comments_List_Item_Bubble:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(247,248,250,1)
                                    FillPortions: =1
                                    AutoHeight: =true
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    PaddingBottom: =6
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    PaddingTop: =6
                                    RadiusBottomLeft: =12
                                    RadiusBottomRight: =12
                                    RadiusTopLeft: =12
                                    RadiusTopRight: =12
                                  Children:
