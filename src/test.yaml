                        Color: =ColorValue("#2E7D4F")
                        DisplayMode: =DisplayMode.View
                        Fill: =RGBA(0, 0, 0, 0)
                        Height: =30
                        HoverBorderColor: =
                        HoverColor: =
                        HoverFill: =
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PressedBorderColor: =
                        PressedColor: =
                        PressedFill: =
                        RadiusBottomLeft: =15
                        RadiusBottomRight: =15
                        RadiusTopLeft: =15
                        RadiusTopRight: =15
                        Size: =11
                        Text: =ThisItem.Tipo
                        Width: =130
                  - galPosts_Card_Tags_Categoria:
                      Control: Classic/Button@2.2.0
