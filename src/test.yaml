                      Control: Classic/Button@2.2.0
                      Properties:
                        DisplayMode: =DisplayMode.View
                        Fill: =ColorValue("#2E7D4F")
                        Height: =44
                        HoverBorderColor: =
                        HoverColor: =
                        HoverFill: =
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PressedBorderColor: =
                        PressedColor: =
                        PressedFill: =
