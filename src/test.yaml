                        Height: =16
                        Image: ="data:image/svg+xml;utf8, "&EncodeUrl("<svg xmlns='http://www.w3.org/2000/svg' width='40px' height='40px' viewBox='0 0 20 20' fill='#7A8A8F'><path d='M4 3a2 2 0 0 0-2 2v3.67c.29-.35.62-.66 1-.91V5a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H9.24l-.24.33V15h7a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H4Zm1 3.5c0-.28.22-.5.5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5Zm.5 8.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Zm-2.5.24a4.48 4.48 0 0 0 5 0V18a.5.5 0 0 1-.8.4l-1.4-1.05a.5.5 0 0 0-.6 0L3.8 18.4A.5.5 0 0 1 3 18v-2.76ZM10.5 10a.5.5 0 0 0 0 1h4a.5.5 0 0 0 0-1h-4Z'/></svg>")
