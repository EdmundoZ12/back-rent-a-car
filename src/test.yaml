                  VerticalAlign: =VerticalAlign.Top
                  Width: =Parent.Width
            - galPosts_Card_Divider:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =ColorValue("#F0F0F0")
                  Height: =1
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  Width: =Parent.Width
            - galPosts_Card_Acciones:
                Control: GroupContainer@1.5.0
