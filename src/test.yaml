                                        Properties:
                                          AutoHeight: =true
                                          FontWeight: =FontWeight.Bold
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          Size: =11
                                          Text: =ThisItem.Nombre & "  ·  " & ThisItem.Fecha
                                          Width: =Parent.Width
                                    - galPosts_Card_Comments_List_Item_Bubble_Txt:
                                        Control: ModernText@1.0.0
                                        Properties:
                                          AutoHeight: =true
                                          Color: =RGBA(60,60,60,1)
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          Size: =11
                                          Text: =ThisItem.Comentario
                                          Width: =Parent.Width
                  - galPosts_Card_Comments_Input:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(0,0,0,0)
                        Height: =44
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Width: =Parent.Width
                      Children:
                        - galPosts_Card_Comments_Input_Field:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              BorderColor: =RGBA(229,231,235,1)
                              FillPortions: =1
                              Height: =38
                              HintText: ="Escribe un comentario..."
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              RadiusBottomLeft: =19
                              RadiusBottomRight: =19
                              RadiusTopLeft: =19
                              RadiusTopRight: =19
                              Size: =12
                        - galPosts_Card_Comments_Input_Btn:
                            Control: Classic/Button@2.2.0
                            Properties:
                              Fill: =ColorValue("#2E7D4F")
                              Height: =38
                              HoverBorderColor: =
                              HoverColor: =ColorValue("#ffffff")
                              HoverFill: =ColorValue("#236040")
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              OnSelect: |-
                                =If(
                                    !IsBlank(galPosts_Card_Comments_Input_Field.Text),
                                    Collect(colComentarios,
                                        {
                                            ID: CountRows(colComentarios)+1,
                                            PostID: ThisItem.Id,
                                            Iniciales: "YO",
                                            Nombre: "Mi Nombre",
                                            Comentario: galPosts_Card_Comments_Input_Field.Text,
                                            Fecha: "ahora",
                                            AvatarColor: RGBA(46,125,79,1)
                                        }
                                    );
                                    Reset(galPosts_Card_Comments_Input_Field)
                                )
                              PressedBorderColor: =
                              PressedColor: =
                              PressedFill: =ColorValue("#1a4a30")
                              RadiusBottomLeft: =19
                              RadiusBottomRight: =19
                              RadiusTopLeft: =19
                              RadiusTopRight: =19
                              Text: ="Enviar"
                              Width: =72
